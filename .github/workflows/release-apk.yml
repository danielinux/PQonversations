name: Build release APK

# Builds a fresh PQonversations APK on every commit to master and publishes
# it as a GitHub Release. The conversationsFree debug variant is used: it has
# no proprietary Google/FCM dependencies and is debug-signed, so it builds and
# installs without any signing secrets. See the note in the release body for
# how to switch to a properly release-signed build.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (conversationsFree debug)
        run: ./gradlew --no-daemon --stacktrace assembleConversationsFreeDebug

      - name: Prepare artifact
        id: apk
        run: |
          set -e
          apk="$(find . -path '*/outputs/apk/conversationsFree/debug/*.apk' | head -n1)"
          if [ -z "$apk" ]; then
            echo "No conversationsFree debug APK found" >&2
            find . -path '*/outputs/apk/*' -name '*.apk' >&2 || true
            exit 1
          fi
          short="$(git rev-parse --short HEAD)"
          out="PQonversations-conversationsFree-debug-${short}.apk"
          cp "$apk" "$out"
          echo "file=$out" >> "$GITHUB_OUTPUT"
          echo "short=$short" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.run_number }}
          name: PQonversations ${{ steps.apk.outputs.short }}
          body: |
            Automated PQonversations build for commit ${{ github.sha }}.

            Variant: `conversationsFree` **debug-signed** — sideload only; this is not a
            Play/F-Droid release. To produce a properly release-signed APK, add a keystore
            plus a `signingConfig`, and switch the build step to `assembleConversationsFreeRelease`
            (store the keystore/password as encrypted repository secrets).
          prerelease: true
          files: ${{ steps.apk.outputs.file }}
