name: Release APK

# Builds a PQonversations APK and publishes it as a GitHub Release whenever a
# new tag is pushed. The conversationsFree debug variant is used: it has no
# proprietary Google/FCM dependencies and is debug-signed, so it builds and
# installs without any signing secrets. See the note in the release body for
# how to switch to a properly release-signed build.

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (conversationsFree debug)
        run: ./gradlew --no-daemon --stacktrace assembleConversationsFreeDebug

      - name: Prepare artifact
        id: apk
        run: |
          set -e
          apk="$(find . -path '*/outputs/apk/conversationsFree/debug/*.apk' | head -n1)"
          if [ -z "$apk" ]; then
            echo "No conversationsFree debug APK found" >&2
            find . -path '*/outputs/apk/*' -name '*.apk' >&2 || true
            exit 1
          fi
          out="PQonversations-${GITHUB_REF_NAME}.apk"
          cp "$apk" "$out"
          echo "file=$out" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PQonversations ${{ github.ref_name }}
          body: |
            PQonversations ${{ github.ref_name }} — automated build for tag `${{ github.ref_name }}` (commit ${{ github.sha }}).

            Variant: `conversationsFree` **debug-signed** — sideload only. To produce a
            properly release-signed APK, add a keystore plus a `signingConfig`, and switch
            the build step to `assembleConversationsFreeRelease` (store the keystore and
            passwords as encrypted repository secrets).
          files: ${{ steps.apk.outputs.file }}
