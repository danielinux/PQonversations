name: Release APK

# Builds a PQonversations APK and publishes it as a GitHub Release whenever a
# new tag is pushed. The conversationsFree debug variant is used: it has no
# proprietary Google/FCM dependencies and is debug-signed, so it builds and
# installs without any signing secrets. See the note in the release body for
# how to switch to a properly release-signed build.

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (conversationsFree debug)
        run: ./gradlew --no-daemon --stacktrace assembleConversationsFreeDebug

      - name: Prepare artifact
        id: apk
        run: |
          set -e
          # ABI splits are enabled in build.gradle, so the build emits per-ABI
          # APKs (armeabi-v7a / x86 / x86_64 / arm64-v8a) PLUS a universal one.
          # Publish the UNIVERSAL APK so it installs on every device — a per-ABI
          # split is rejected as "app not compatible" on a non-matching phone.
          dir='*/outputs/apk/conversationsFree/debug'
          apk="$(find . -path "$dir/*universal*.apk" | head -n1)"
          [ -z "$apk" ] && apk="$(find . -path "$dir/*arm64-v8a*.apk" | head -n1)"
          [ -z "$apk" ] && apk="$(find . -path "$dir/*.apk" | head -n1)"
          if [ -z "$apk" ]; then
            echo "No conversationsFree debug APK found" >&2
            find . -path '*/outputs/apk/*' -name '*.apk' >&2 || true
            exit 1
          fi
          echo "Selected APK: $apk"
          out="PQonversations-${GITHUB_REF_NAME}-universal.apk"
          cp "$apk" "$out"
          echo "file=$out" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PQonversations ${{ github.ref_name }}
          body: |
            PQonversations ${{ github.ref_name }} — automated build for tag `${{ github.ref_name }}` (commit ${{ github.sha }}).

            Variant: `conversationsFree` **debug** — sideload only. Package id
            `eu.siacs.conversations.pq`, so it installs ALONGSIDE an upstream
            Conversations install (no collision). Signed with the repo's committed
            debug keystore, so every release shares one certificate and updates
            in place (no uninstall between versions).

            To produce a properly release-signed APK instead, add a release keystore
            plus its `signingConfig` and switch the build step to
            `assembleConversationsFreeRelease` (store the keystore and passwords as
            encrypted repository secrets).
          files: ${{ steps.apk.outputs.file }}
